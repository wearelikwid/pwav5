<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <meta name='theme-color' content='#242424'>
    <meta name='description' content='El Forma - Create Program'>
    <meta name='apple-mobile-web-app-capable' content='yes'>
    <meta name='mobile-web-app-capable' content='yes'>
    <meta name='apple-mobile-web-app-status-bar-style' content='black'>
    <meta name='apple-mobile-web-app-title' content='El Forma'>
    <title>El Forma - Create Program</title>

    <!-- Styles -->
    <link rel='stylesheet' href='styles/main.css'>
    <link rel='stylesheet' href='styles/program.css'>
</head>
<body>
    <div class='container'>
        <header class='app-header'>
            <a href='program.html' class='back-button'>←</a>
            <h1>Create Program</h1>
        </header>

        <main>
            <form id='create-program-form' class='program-form'>
                <div class='form-group'>
                    <label for='program-name'>Program Name</label>
                    <input type='text' id='program-name' name='program-name' required>
                </div>

                <div class='form-group'>
                    <label for='program-duration'>Duration (weeks)</label>
                    <input type='number' id='program-duration' name='program-duration' min='1' required>
                </div>

                <div id='program-weeks' class='program-weeks'>
                    <!-- Weeks will be generated dynamically -->
                </div>

                <div class='form-actions'>
                    <button type='submit' class='button primary'>Save Program</button>
                </div>
            </form>
        </main>
    </div>

    <!-- Templates -->
    <template id="week-template">
        <div class="program-week" data-week="">
            <h2 class="week-title">Week</h2>
            <div class="week-days">
                <!-- Days will be added here -->
            </div>
        </div>
    </template>

    <template id="day-template">
        <div class="program-day" data-day="">
            <h3 class="day-title">Day</h3>
            <div class="form-group">
                <input type="text" class="workout-name" placeholder="Workout Name">
                <button type="button" class="button add-section">Add Section</button>
            </div>
            <div class="workout-sections">
                <!-- Sections will be added here -->
            </div>
        </div>
    </template>

    <template id="section-template">
        <div class="workout-section">
            <div class="section-header">
                <input type="text" class="section-name" placeholder="Section Name">
                <button type="button" class="button remove-section">Remove Section</button>
            </div>
            <div class="exercises-list">
                <!-- Exercises will be added here -->
            </div>
            <button type="button" class="button add-exercise">Add Exercise</button>
        </div>
    </template>

    <template id="exercise-template">
        <div class="exercise-item">
            <div class="exercise-inputs">
                <input type="text" class="exercise-name" placeholder="Exercise Name" required>
                <input type="number" class="exercise-sets" placeholder="Sets" min="0">
                <input type="number" class="exercise-reps" placeholder="Reps" min="0">
                <textarea class="exercise-notes" placeholder="Notes"></textarea>
            </div>
            <button type="button" class="button remove-exercise">Remove</button>
        </div>
    </template>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>

    <!-- Your Firebase Config -->
    <script src="scripts/firebase-config.js"></script>
    
    <!-- Your App Scripts -->
    <script src='scripts/create-program.js'></script>
</body>
</html>
